<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>小小数感乐园</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">数学启蒙小游戏</p>
          <h1>小小数感乐园</h1>
        </div>
        <button class="parent-toggle" id="parentToggle" type="button" aria-pressed="false">
          陪练提示
        </button>
      </header>

      <main>
        <section class="profile-panel" aria-label="选择模式">
          <button class="profile-card active" type="button" data-profile="sister">
            <span class="profile-name">姐姐</span>
            <span class="profile-desc">6 岁 · 大班 · 入学准备</span>
          </button>
          <button class="profile-card" type="button" data-profile="younger">
            <span class="profile-name">妹妹</span>
            <span class="profile-desc">4 岁 · 数一数 · 找一找</span>
          </button>
          <button class="profile-card" type="button" data-profile="play">
            <span class="profile-name">陪玩</span>
            <span class="profile-desc">不计对错 · 一起说思路</span>
          </button>
        </section>

        <section class="learning-map" aria-label="选择小游戏">
          <button class="game-tile active" type="button" data-game="practice">
            <span class="tile-art practice-art" aria-hidden="true"></span>
            <span>20以内加减</span>
          </button>
          <button class="game-tile" type="button" data-game="count">
            <span class="tile-art dots-art" aria-hidden="true"></span>
            <span>点点农场</span>
          </button>
          <button class="game-tile" type="button" data-game="add">
            <span class="tile-art basket-art" aria-hidden="true"></span>
            <span>水果篮子</span>
          </button>
          <button class="game-tile" type="button" data-game="subtract">
            <span class="tile-art cookie-art" aria-hidden="true"></span>
            <span>小饼干拿走</span>
          </button>
          <button class="game-tile" type="button" data-game="make10">
            <span class="tile-art house-art" aria-hidden="true"></span>
            <span>数字小屋</span>
          </button>
          <button class="game-tile" type="button" data-game="shape">
            <span class="tile-art shape-art" aria-hidden="true"></span>
            <span>图形收纳</span>
          </button>
        </section>

        <section class="play-card" aria-live="polite">
          <div class="round-info">
            <span id="gameLabel">点点农场</span>
            <span id="roundLabel">第 1 题 / 6 题</span>
          </div>

          <div class="story-row">
            <div class="scene-badge" id="sceneBadge" aria-hidden="true"></div>
            <div>
              <p class="prompt-kicker" id="promptKicker">看一看，数一数</p>
              <h2 id="questionText">这里有几个点点？</h2>
            </div>
          </div>

          <div class="visual-stage" id="visualStage" aria-label="题目图像"></div>

          <div class="typed-answer hidden" id="typedAnswerPanel">
            <label class="answer-label" for="answerInput">把答案写在这里</label>
            <div class="answer-entry">
              <input
                id="answerInput"
                class="answer-input"
                type="text"
                inputmode="numeric"
                min="0"
                max="20"
                autocomplete="off"
                aria-label="输入答案"
              />
              <button class="primary-btn check-btn" id="checkBtn" type="button">确认</button>
            </div>
            <div class="number-pad" id="numberPad" aria-label="数字键盘">
              <button type="button" data-key="1">1</button>
              <button type="button" data-key="2">2</button>
              <button type="button" data-key="3">3</button>
              <button type="button" data-key="4">4</button>
              <button type="button" data-key="5">5</button>
              <button type="button" data-key="6">6</button>
              <button type="button" data-key="7">7</button>
              <button type="button" data-key="8">8</button>
              <button type="button" data-key="9">9</button>
              <button type="button" data-key="+" data-operator-key hidden>+</button>
              <button type="button" data-key=">" data-compare-key hidden>&gt;</button>
              <button type="button" data-key="clear">清除</button>
              <button type="button" data-key="0">0</button>
              <button type="button" data-key="-" data-operator-key hidden>-</button>
              <button type="button" data-key="<" data-compare-key hidden>&lt;</button>
              <button type="button" data-key="=" data-compare-key hidden>=</button>
              <button type="button" data-key="back">删除</button>
            </div>
          </div>

          <div class="answer-grid" id="answerGrid" aria-label="答案选项"></div>

          <p class="feedback" id="feedback">不用着急，可以一个一个数。</p>

          <div class="teach-card hidden" id="teachCard">
            <p class="eyebrow">我们换个方法看看</p>
            <h3 id="teachTitle">凑十法</h3>
            <div class="animation-stage" id="animationStage" aria-label="动画讲解"></div>
            <p class="step-caption" id="stepCaption">先看这一步。</p>
            <div class="teach-visual" id="teachVisual"></div>
            <ol id="teachSteps"></ol>
            <div class="teach-actions">
              <button class="secondary-btn" id="replayTeachBtn" type="button">再看一遍</button>
            </div>
          </div>

          <div class="helper-note hidden" id="helperNote">
            家长提示：请孩子先用手指点着数，再说“我怎么知道是这个数”。
          </div>

          <div class="control-row">
            <button class="secondary-btn" id="skipBtn" type="button">我想换一题</button>
            <button class="primary-btn" id="nextBtn" type="button">下一题</button>
          </div>
        </section>

        <section class="progress-card" aria-label="练习记录">
          <div>
            <p class="eyebrow">今天的感觉</p>
            <h2 id="summaryTitle">先玩一小轮</h2>
            <p id="summaryText">每轮 6 题，答完就休息一下。这里不排名，也不抢速度。</p>
          </div>
          <div class="record-panel">
            <div class="stat-grid">
              <div class="stat-box">
                <span>本次</span>
                <strong id="sessionStats">0 题 · 对 0 · 再想 0</strong>
              </div>
              <div class="stat-box">
                <span>今天</span>
                <strong id="todayStats">0 题 · 对 0 · 再想 0</strong>
              </div>
            </div>
            <div class="progress-bars" id="progressBars"></div>
            <div class="wrong-book">
              <div class="wrong-book-head">
                <h3>错题本</h3>
                <span id="wrongCount">还没有错题</span>
              </div>
              <div class="wrong-list" id="wrongBookList"></div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
